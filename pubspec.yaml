name: igb_scan_suite
description: "IGB Scan Suite"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+25
environment:
  sdk: ^3.9.0
dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5   # Use the latest version available
  image_picker: ^1.2.0 # Use the latest version from pub.dev
  image_cropper: ^11.0.0 # For cropping images
  google_mlkit_document_scanner: ^0.4.0 # For automatic document scanning
  cupertino_icons: ^1.0.8
  google_mlkit_text_recognition: ^0.15.0 # The latest version
  fl_chart: ^0.66.2  # For charts and graphs
  intl: ^0.20.2
  pdf: ^3.10.0
  path_provider: ^2.1.3
  http: ^1.2.0
  url_launcher: ^6.2.2
  http_parser: ^4.1.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
 image_path: "icons/small-icon.jpeg"
 android: true
 ios: true
flutter:
  uses-material-design: true